<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Icons Pack — Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;padding:2rem;min-height:100vh;transition:background .3s,color .3s}
h1{font-size:1.8rem;margin-bottom:.3rem}
.sub{opacity:.7;margin-bottom:2rem}
.controls{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.season-toggle{display:flex;gap:0;margin-bottom:2rem}
.season-btn{padding:.5rem 1.5rem;border:2px solid;cursor:pointer;font-weight:600;transition:.15s;background:transparent}
.season-btn:first-child{border-radius:8px 0 0 8px}
.season-btn:last-child{border-radius:0 8px 8px 0}
.season-btn.active{color:#fff}
.theme-btn{padding:.5rem 1rem;border:2px solid;border-radius:8px;cursor:pointer;font-weight:600;transition:.15s;background:transparent}
.theme-btn:hover{transform:translateY(-1px)}
.theme-btn.active{border-width:3px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:1rem}
.card{background:rgba(255,255,255,.06);border-radius:10px;padding:1rem;text-align:center;border:1px solid;transition:.2s;backdrop-filter:blur(4px)}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.card svg{width:72px;height:72px;display:block;margin:0 auto}
.card p{margin-top:.6rem;font-size:.8rem;font-weight:500;opacity:.85}
.element-label{grid-column:1/-1;font-size:1.2rem;font-weight:700;margin-top:.5rem;margin-bottom:.3rem;opacity:.6}
.palette-dots{display:flex;gap:4px;justify-content:center;margin-top:.4rem}
.dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
</style>
</head>
<body>
<h1>🌊 Wave Icons Pack</h1>
<p class="sub">5 elements × 4 seasons × 10 icons = 200 SVGs</p>

<div class="season-toggle" id="seasonToggle"></div>
<div class="controls" id="themeControls"></div>
<div class="grid" id="iconGrid"></div>

<script>
const PALETTES = {
  water:{name:"Water",base:"#0d6efd",spring:{bg:"#e0f4f4",c1:"#0ABDE3",c2:"#40E0D0",c3:"#7FF5E8",accent:"#f7c948"},summer:{bg:"#e8f4f8",c1:"#006994",c2:"#0D6EFD",c3:"#00BFFF",accent:"#FFD700"},fall:{bg:"#e8eef4",c1:"#4A6FA5",c2:"#5F9EA0",c3:"#7DA6C4",accent:"#C4956A"},winter:{bg:"#f0f8ff",c1:"#A8D8EA",c2:"#6CA6CD",c3:"#D4EAF7",accent:"#E0E0E0"}},
  earth:{name:"Earth",base:"#8B5E3C",spring:{bg:"#f4f1e6",c1:"#8B5E3C",c2:"#4C8C28",c3:"#7CB342",accent:"#FFD93D"},summer:{bg:"#f5eddd",c1:"#8B4513",c2:"#2D5A1E",c3:"#6B8E23",accent:"#FF8C00"},fall:{bg:"#f4e8d8",c1:"#A0522D",c2:"#D2691E",c3:"#B22222",accent:"#FFA500"},winter:{bg:"#f0ede8",c1:"#C4A882",c2:"#9E9E9E",c3:"#B0C4DE",accent:"#D3D3D3"}},
  wind:{name:"Wind",base:"#4FC3F7",spring:{bg:"#f0faff",c1:"#81D4FA",c2:"#B3E5FC",c3:"#E1F5FE",accent:"#FFFFFF"},summer:{bg:"#e8f4fd",c1:"#4FC3F7",c2:"#0288D1",c3:"#81D4FA",accent:"#FFFFFF"},fall:{bg:"#eceff1",c1:"#78909C",c2:"#90A4AE",c3:"#B0BEC5",accent:"#E0E0E0"},winter:{bg:"#f5fafc",c1:"#B3E5FC",c2:"#E1F5FE",c3:"#F5F5F5",accent:"#ECEFF1"}},
  fire:{name:"Fire",base:"#FF4500",spring:{bg:"#fff8f0",c1:"#FF8A65",c2:"#FFAB91",c3:"#FFCC80",accent:"#FFD700"},summer:{bg:"#fff5f0",c1:"#D32F2F",c2:"#FF4500",c3:"#FF6B35",accent:"#FFD700"},fall:{bg:"#fce8d5",c1:"#FF6F00",c2:"#D84315",c3:"#B71C1C",accent:"#FFB300"},winter:{bg:"#fcecec",c1:"#EF9A9A",c2:"#E57373",c3:"#FFCDD2",accent:"#F5F5F5"}},
  ether:{name:"Ether",base:"#9E9E9E",spring:{bg:"#fafafa",c1:"#757575",c2:"#A5D6A7",c3:"#BDBDBD",accent:"#81C784"},summer:{bg:"#FFFFFF",c1:"#212121",c2:"#616161",c3:"#9E9E9E",accent:"#000000"},fall:{bg:"#f5f0eb",c1:"#5D4037",c2:"#8D6E63",c3:"#BCAAA4",accent:"#A1887F"},winter:{bg:"#fcfcfc",c1:"#E0E0E0",c2:"#BDBDBD",c3:"#F5F5F5",accent:"#90CAF9"}}
};
const ICONS = ["wave-line","wave-layered","wave-circle","wave-audio","wave-sun","wave-seamless","wave-tsunami","wave-minimal","wave-mountains","wave-spiral"];
const NAMES = {"wave-line":"Line","wave-layered":"Layered","wave-circle":"Circle","wave-audio":"Audio","wave-sun":"Sun","wave-seamless":"Pattern","wave-tsunami":"Tsunami","wave-minimal":"Minimal","wave-mountains":"Mountains","wave-spiral":"Spiral"};
const ELEMENTS = ["water","earth","wind","fire","ether"];
const SEASONS = ["spring","summer","fall","winter"];
const SEASON_ICONS = {"spring":"🌸","summer":"☀️","fall":"🍂","winter":"❄️"};

let currentElem = "water";
let currentSeason = "spring";

const seasonToggle = document.getElementById("seasonToggle");
SEASONS.forEach(s=>{
  const btn = document.createElement("button");
  btn.className = "season-btn" + (s===currentSeason?" active":"");
  btn.textContent = `${SEASON_ICONS[s]} ${s.charAt(0).toUpperCase()+s.slice(1)}`;
  if(s===currentSeason) btn.style.background="#333",btn.style.color="#fff",btn.style.borderColor="#333";
  else btn.style.borderColor="#999",btn.style.color="#999";
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".season-btn").forEach(x=>{x.classList.remove("active");x.style.background="";x.style.color=x.style.borderColor="#999"});
    btn.classList.add("active");btn.style.background="#333";btn.style.color="#fff";btn.style.borderColor="#333";
    currentSeason=s;render();
  });
  seasonToggle.appendChild(btn);
});

const ctrl = document.getElementById("themeControls");
ELEMENTS.forEach(e=>{
  const btn = document.createElement("button");
  btn.className = "theme-btn" + (e===currentElem?" active":"");
  btn.textContent = PALETTES[e].name;
  btn.style.borderColor = PALETTES[e].base;
  if(e===currentElem) btn.style.background = PALETTES[e].base, btn.style.color = "#fff";
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".theme-btn").forEach(x=>{x.classList.remove("active");x.style.background="";x.style.color=""});
    btn.classList.add("active");btn.style.background=PALETTES[e].base;btn.style.color="#fff";
    currentElem=e;render();
  });
  ctrl.appendChild(btn);
});

function render(){
  const grid = document.getElementById("iconGrid");
  const colors = PALETTES[currentElem][currentSeason];
  const bg = colors.bg;
  const seasonName = currentSeason.charAt(0).toUpperCase()+currentSeason.slice(1);
  document.body.style.background = bg;
  document.body.style.color = (currentSeason==="winter"||currentSeason==="spring")?"#222":"#eee";

  grid.innerHTML = `<div class="element-label" style="color:${PALETTES[currentElem].base}">${PALETTES[currentElem].name} — ${SEASON_ICONS[currentSeason]} ${seasonName}</div>`;

  ICONS.forEach(icon=>{
    fetch(`dist/${currentElem}-${currentSeason}/${icon}.svg`).then(r=>r.text()).then(svg=>{
      const card = document.createElement("div");
      card.className = "card";
      const seasonName = currentSeason.charAt(0).toUpperCase()+currentSeason.slice(1);
      card.style.background = (currentSeason==="winter"||currentSeason==="spring")?"rgba(0,0,0,.03)":"rgba(255,255,255,.06)";
      card.style.borderColor = (currentSeason==="winter"||currentSeason==="spring")?"rgba(0,0,0,.08)":"rgba(255,255,255,.1)";
      card.innerHTML = svg + `<p>${NAMES[icon]||icon}</p>`;
      if(icon==="wave-seamless"){
        const dots = document.createElement("div");dots.className="palette-dots";
        [colors.c1,colors.c2,colors.c3,colors.accent].forEach(c=>{
          const d=document.createElement("span");d.className="dot";d.style.background=c;dots.appendChild(d)
        });
        card.appendChild(dots);
      }
      grid.appendChild(card);
    });
  });
}

render();
</script>
</body>
</html>
