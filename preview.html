<html><head><title>Wave Icons Preview</title><style>

<h1>🌊 Wave Icons Pack</h1>
<div class="grid">

<div class="card"><img src="wave-circle.svg"><p>Wave Circle</p></div>
<div class="card"><img src="wave-audio.svg"><p>Audio Wave</p></div>
<div class="card"><img src="wave-sun.svg"><p>Wave & Sun</p></div>
<div class="card"><img src="wave-seamless.svg"><p>Seamless Pattern</p></div>
<div class="card"><img src="wave-tsunami.svg"><p>Tsunami</p></div>
<div class="card"><img src="wave-minimal.svg"><p>Minimal Wave</p></div>
<div class="card"><img src="wave-mountains.svg"><p>Wave Mountains</p></div>
<div class="card"><img src="wave-spiral.svg"><p>Wave Spiral</p></div>
</div>
<p style="color:#888;margin-top:2em">Open each .svg in Inkscape to recolor and customize.<br>
